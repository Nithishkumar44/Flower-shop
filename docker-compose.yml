version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: luxe_blooms_postgres
    restart: always
    environment:
      POSTGRES_DB: flower_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flower_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: luxe_blooms_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgrespassword@db:5432/flower_db?schema=public
      JWT_SECRET: luxurious_floral_secret_key_change_me_in_production
      JWT_EXPIRES_IN: 7d
      GOOGLE_CLIENT_ID: ""
      CLOUDINARY_CLOUD_NAME: ""
      CLOUDINARY_API_KEY: ""
      CLOUDINARY_API_SECRET: ""
      RAZORPAY_KEY_ID: ""
      RAZORPAY_KEY_SECRET: ""
    depends_on:
      db:
        condition: service_healthy
    # Auto-run Prisma migration, seed database, and launch express server
    command: >
      sh -c "npx prisma db push && npm run db:seed && node dist/server.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: luxe_blooms_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      NEXT_TELEMETRY_DISABLED: 1
    depends_on:
      - backend

volumes:
  postgres_data:
